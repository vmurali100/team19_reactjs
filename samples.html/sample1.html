<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to html</title>
    <!-- external style -->
    <link rel="stylesheet" href="./externalstyles.css">
    <!-- internal style -->
    <style>
        h2{
            background-color: aqua;
            text-decoration: solid;
        }
    </style>
</head>
<body>
    <!-- inline style -->
    <h1 style="font-size: 70px;">heading-1</h1>
    <h2>heading-2</h2>
    <h3>heading-3</h3>
    <h4>heading-4</h4>
    <h5>heading-5</h5>
    <h6>heading-6</h6>

    <a href="https://www.eenadu.net/">eenadu</a>
    <!-- ul means unorder list -->
    <ul type="circle">
      <li>hello-1</li>
      <li>hello-2</li>
      <li>hello-3</li>
      <li>hello-4</li>
      <li>hello-5</li>
      <li>hello-6</li>
    </ul>
    <!--ol means order list  -->
    <!-- here we can give ol type=a,I,i,A... -->
    <ol type="i">
        <li>welcome</li>
        <li>welcome</li>
        <li>welcome</li>
        <li>welcome</li>
        <li>welcome</li>
    </ol>
     <img src="https://img.freepik.com/premium-photo/orange-butterfly-flower-nature-background_38810-5249.jpg?w=740" alt="">
     <hr><br>
     <a href="https://www.eenadu.net/">eenadu</a>
</body>
</html>
