<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to tables</title>
</head>
<body>
    <table border="1px">
        <tr>
                <th>Subject Name</th>
                <th>Marks</th>
                <th>Pass marks</th>
                <th>%</th>
        </tr>
        <tr>
               <td>Telugu</td>
               <td>60</td>
               <td>35</td>
               <td>60%</td>
        </tr>
        <tr>
                <td>Hindi</td>
                <td>50</td>
                <td>35</td>
                <td>50%</td>
            </tr>
            <tr>
                <td>English</td>
                <td>70</td>
                <td>35</td>
                <td>70%</td>
            </tr>
            <tr>
                <td>Maths</td>
                <td>80</td>                    
                <td>35</td>
                <td>80%</td>  
            </tr>
            <tr>
                <td>Social</td>
                <td>85</td>
                <td>35</td>
                <td>85%</td>
            </tr> 
            <tr>
                <td>Science</td>
                <td>90</td>
                <td>35</td>
                <td>90%</td>
            </tr>
        </table>
        <hr>
        <table border="1px">
            <tr>
                <!-- rowspan means to merge two spaces into one -->
                <!-- colspan means to divide two colums  -->
                <th rowspan="2">Subject Name</th>
                <th colspan="2">Marks</th>
                <th rowspan="2">Pass Marks</th>
                <th rowspan="2">%</th>
            </tr>
            <tr>
                <th>Internal</td>
                <th>External</td>
            </tr>
            <tr>
                <td>Telugu</td>
                <td>60</td>
                <!-- <td></td> means empty tag -->
                <td></td>
                <td>35</td>
                <td>60%</td>
            </tr>
            <tr>
                <td>Hindi</td>
                <td>50</td>
                <td></td>
                <td>35</td>
                <td>50%</td>
            </tr>
            <tr>
                <td>English</td>
                <td>70</td>
                <td></td>
                <td>35</td>
                <td>70%</td>
            </tr>
            <tr>
                <td>Maths</td>
                <td>80</td>
                <td></td>                    
                <td>35</td>
                <td>80%</td>  
            </tr>
            <tr>
                <td>Social</td>
                <td>85</td>
                <td></td>
                <td>35</td>
                <td>85%</td>
            </tr> 
            <tr>
                <td>Science</td>
                <td>90</td>
                <td></td>
                <td>35</td>
                <td>90%</td>
        
                </table>

        
</body>
</html>
