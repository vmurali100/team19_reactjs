<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #header{
            width: 760px;
            height: 150px;
            background-color: lightgreen;
        }
        #slider{
            width: 760px;
            height: 150px;
            background-color: lightcoral;
        }
        #content{
            width: 760px;
            height: 150px;
            background-color: limegreen;
        }
        #footer{
            width: 760px;
            height: 100px;
            background-color:lightsalmon;
        }
        #leftbox{
            width: 100px;
            height: 100px;
            background-color: blue;
            float: left;
        }
        #rightbox{
            width: 100px;
            height: 100px;
            background-color: yellow;
            float: right;
        }
        #leftslider{
            width: 100px;
            height: 100px;
            background-color: darkmagenta;
            float: left;
        }
        #rightslider{
            width: 100px;
            height: 100px;
            background-color: mediumvioletred;
            float: right;
        }
        #leftcontent{
            width:100px;
            height: 100px;
            background-color: black;
            float: left;
        }
        #rightcontent{
            width: 100px;
            height: 100px;
            background-color: darkgreen;
            float: right;
        }

    </style>
</head>
<body>
    <div id="header">
        <div id="leftbox"></div>
        <div id="rightbox"></div>
    </div>
    <div id="slider">
        <div id="leftslider"></div>
        <div id="rightslider"></div>
    </div>
    <div id="content">
        <div id="leftcontent"></div>
        <div id="rightcontent"></div>
    </div>
    <div id="footer"></div>
    
</body>
</html>
