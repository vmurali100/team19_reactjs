<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin-left: 400px;
        }
    </style>
    
</head>
<body> 
    <h1 style="text-align: center;">Registration form in html</h1>
    <form action="">
        <table>
            <tr>
                <td>
                     First Name:
                </td>
                <td>
                    <input type="Name" placeholder=" First Name">
                </td>
            </tr>
            <tr>
                <td>
                    Last Name:
                </td>
                <td>
                    <input type="name" placeholder=" Last Name">
                </td>
            </tr>
            <tr>
                <td>
                    Email Id:   
                </td>
                <td>
                    <input type="Email" placeholder="Example123@gmail.com" Email Id>
                </td>
            </tr>
            <tr>
                <td>
                    Password:
                </td>
                <td>
                    <input type="Password" placeholder="Password" Password>
                </td>
            </tr>
            <tr>
                <td>
                    Date Of Birth:
                </td>
                <td>
                    <input type="date">
                </td>
            <tr>
                <td>
                Gender:
            </td>
            <td>
                <input type="radio" name="gender">Male
                <input type="radio" name="gender">Female
            </td>
            
            <tr>
                
            </tr>
            
            </tr>
            <tr>
                <td>
                    Educational Qualification:
                </td>
                <td>
                    <select>
                        <option>Select Option</option>
                        <option>SSC</option>
                        <option>Intermediate</option>
                        <option></option> Graduation</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    Address:
                </td>
                <td>
                    <textarea name="Address"cols="17" rows="5" placeholder="Address"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="Submit" value="Submit">
                    <input type="Reset" value="Reset">
                </td>
            </tr>
        </table
    </form>
</body>
</html>
