<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .wrapper {
            width: 100%;
            border: 1px solid black;
            background-color: cadetblue;
        }

        #header {
            display: block;
            margin: 0 auto;
            width: 960px;
            background-color: pink;
            padding: 20px;
            overflow: auto;
        }

        #head {
            width: 300px;
            float: left;
        }

        nav {
            float: right;
            padding: 20px 0;
            background-color: antiquewhite;
            margin-top: 10px;
        }

        li {
            list-style: none;
            margin-right: 25px;
            display: inline;
            text-transform: uppercase;
        }

        li a {
            text-decoration: none;
            font-size: 15px;
        }

        h1 a {
            text-decoration: none;
            color: black;
            font-size: 36px;
        }

        h2 {
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header id="header" class="clear">
            <div id="head">
                <h1>
                    <a href="#">Basic 88</a>
                </h1>
                <h2>welcome to HTML</h2>
            </div>
            <nav>
                <ul>
                    <li>
                        <a href="#">Home</a>
                    </li>
                    <li>
                        <a href="#">Blogs</a>
                    </li>
                    <li>
                        <a href="#">Community</a>
                    </li>
                    <li>
                        <a href="#">Tabs</a>
                    </li>
                    <li>
                        <a href="#">Help</a>
                    </li>

                </ul>
            </nav>
        </header>
    </div>
</body>

</html>
