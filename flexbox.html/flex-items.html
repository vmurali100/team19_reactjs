<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-container{
            display: flex;
            flex-direction: row;
            
        }
        .items{
            width: 150px;
            height: 150px;
            display: flex;
            background-color: yellow;
            margin: 5px;
            color: red;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="items" style="order: 4;">1</div>
        <div class="items" style="order: 2;">2</div>
        <div class="items" style="order: 1;">3</div>
        <div class="items" style="order: 3;">4</div>
      </div>
</body>
</html>
