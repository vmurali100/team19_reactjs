<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .wrapper {
            width: 100%;
            display: block;
        }

        .box {
            color: #c0bab6;
            background-color: #333333;
        }

        #header {
            width: 960px;
            margin: 0 auto;
            overflow: auto;
            padding: 20px 0;
        }

        #header #hgroup {
            float: left;
            margin: 0 0 20px 0;
        }

        #header #hgroup h1,
        #header #hgroup h2 {
            font-weight: normal;
            font-style: normal;
            text-transform: none;
        }

        #header #hgroup h1 {
            font-size: 36px;
        }

        .box a {
            color: #C0BAB6;
            background-color: #333333;
            text-decoration: none;
            outline: none;
        }

        #header #hgroup h2 {
            font-size: 13px;
        }

        #header nav {
            float: right;
            margin: 10px 0 0 0;
            padding: 20px 0;
            color: #C0BAB6;
            background-color: #232323;
        }

        #header nav ul {
            padding: 0 20px;

        }

        #header nav li {
            display: inline;
            margin-right: 25px;
            text-transform: uppercase;
        }

        #header nav li a {
            color: #C0BAB6;
            background-color: #232323;
        }

        .box1 {
            color: #979797;
            background-color: #FFFFFF;
            overflow: auto;
        }

        #container section {
            display: block;
            width: 100%;
            margin: 0 0 30px 0;
            padding: 0;
        }

        #header,
        #container,
        #footer,
        #copyright {
            display: block;
            width: 960px;
            margin: 0 auto;
            padding: 30px 0;
        }

        .one_third,
        .two_third,
        .third_third {
            display: block;
            float: left;
            margin: 0 30px 0 0;
            width: 300px;
        }

        .lastbox {
            margin: 0;
        }

        #container #homepage #services article figure img {
            margin: 0 0 15px 0;
            padding: 4px;
            border: 1px solid #D6D6D6;
        }

        #container #homepage #services article figure h2 {
            font-size: 14px;
            font-weight: bold;
        }

        #container .more {
            text-align: right;
        }

        .box1 a {
            color: #FF9900;
            background-color: #FFFFFF;
        }

        #container #homepage {
            display: block;
            width: 100%;
            line-height: 1.8cm;
        }
    </style>
</head>
