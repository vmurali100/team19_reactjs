<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #grid-container{
            display: grid;
            grid-template-columns: auto auto auto;
            background-color: lightcoral;
            padding: 10px;
            row-gap: 10px;
            column-gap: 10px;
            /* gap: 10px; */
        }
        .box{
            text-align: center;
            color: white;
            background-color: purple;
            border: 1px soid black;
            padding: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>
   <div id="grid-container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
    <div class="box">9</div>
    <div class="box">10</div>
   </div> 
</body>
</html>
