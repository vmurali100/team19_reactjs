<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      .row1 {
        color: #c0bab6;
        background-color: #333333;
      }
      #header, #container, #footer {
        padding: 20px 0;
        width: 960px;
        margin: 0 auto;
        overflow: auto;
      }
      #hgroup {
        float: left;
        margin-bottom: 20px;
      }

      form {
        width: 290px;
        float: right;
        margin: 20px 0;
      }
      #header form input {
        display: block;
        float: left;
        width: 200px;
        margin: 0;
        padding: 5px;
        color: #c0bab6;
        background-color: #232323;
        border: 1px solid #666666;
      }
      #header form #sf_submit {
        display: block;
        float: right;
        width: 70px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        color: #ffffff;
        background-color: #ff9900;
        border: none;
        cursor: pointer;
        padding: 5px;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      #header #hgroup h1,
      #header #hgroup h2 {
        font-weight: normal;
        font-style: normal;
        text-transform: none;
      }
      #header #hgroup h1 {
        font-size: 36px;
      }
      .row1,
      .row1 a {
        color: #c0bab6;
        background-color: #333333;
      }
      a {
        outline: none;
        text-decoration: none;
      }
      #header #hgroup h1,
      #header #hgroup h2 {
        font-weight: normal;
        font-style: normal;
        text-transform: none;
      }
      #header #hgroup h2 {
        font-size: 13px;
      }
      nav {
        padding: 20px 0;
        color: #c0bab6;
        background-color: #232323;
        clear: both;
      }
      ul {
        margin: 0 20px;
      }
      li {
        display: inline;
        margin-right: 25px;
        text-transform: uppercase;
      }
      #header nav li a {
        color: #c0bab6;
        background-color: #232323;
      }
      #container {
    padding: 30px 0;
}
    </style>
  </head>
  <body>
    <div class="wrapper row1">
      <header id="header">
        <div id="hgroup">
          <h1>
            <a href="">Basic 90</a>
          </h1>
          <h2>Free basic Templates</h2>
        </div>
        <form>
          <input type="text" name="" id="" placeholder="Search In Website " />
          <button id="sf_submit">SUBMIT</button>
        </form>
        <nav>
          <ul>
            <li><a href="#">Text Link</a></li>
            <li><a href="#">Text Link</a></li>
            <li><a href="#">Text Link</a></li>
            <li><a href="#">Text Link</a></li>
            <li><a href="#">Text Link</a></li>
          </ul>
        </nav>
      </header>
    </div>
    <div class="wrapper row2">
        <div id="container">
            <section id="slider">
                <figure>
                    <img src="./images/demo/630x300.gif" alt="">
                    <figcaption>
                        <h2>Sample Text </h2>
                        <p>Nullamlacus dui ipsum conseque loborttis non euisque morbi penas dapibulum orna. Urnaultrices quis curabitur phasellentesque congue magnis vestibulum quismodo nulla et feugiat adipiscinia pellentum leo.

                        </p>
                        <footer class="more"></footer>
                    </figcaption>
                </figure>
            </section>
        </div>
    </div>
  </body>
</html>
